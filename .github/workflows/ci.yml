name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-test-scan-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for TruffleHog history scanning

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --- Dependency Security Scans ---
      - name: Audit dependencies (fails on High/Critical CVEs)
        run: pnpm audit --audit-level=high

      - name: OSV-Scanner (Google vulnerability database)
        uses: google/osv-scanner-action@v2.3.8
        with:
          scan-args: --lockfile=pnpm-lock.yaml

      # --- Code Security (SAST) ---
      - name: Semgrep OSS (static analysis)
        uses: semgrep/semgrep-action@v1
        with:
          config: auto

      # --- Secret Detection ---
      - name: TruffleHog (secret scanning)
        uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      # --- Quality Gates ---
      - name: Quality gates (Lint, Typecheck, Test, Build)
        run: pnpm run check
        env:
          PUBLIC_SITE_URL: ${{ secrets.PUBLIC_SITE_URL }}

      # --- Deployment ---
      - name: Deploy to Netlify
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: pnpm dlx netlify-cli deploy --dir=dist --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
